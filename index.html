<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi primera pagina con github</title>

    <style>
        header{
            background-color: darkorchid;

            width: 1200px;

            margin: auto;
            padding: 10px;

        }

        img{
            width:50%;

        .grid{
            display: flex;

        .cita{

            background-color: darkgrey;
            margin: auto;
            padding: 10px;
        }
        .imgGrande img{
            width: 50%;
        }

        .imgGrande{
            width: 100%;
        }
    </style>
</head>
<body>
   <header>
        <div class="contenedor">
            <h1>Nathalia Triviño</h1>
        </div>
   </header>

   <section>
        <div class="contenedor grid">
            <div>
                <img src="img/Snapchat-1211882708.jpg" alt="Imagen de drive">
            </div>
            <div>
                <h2>Te amo mucho mi niña hermosa</h2>
            </div>
            <div>
                <img src="img/Snapchat-2060121127.jpg" alt="">
            </div>
        </div>
   </section>
   <section>
        <div class="contenedor grid">
            <div class="imgGrande">
                <img src="img/OIP.jpg" alt="Imagen de drive">
            </div>
        </div>
   </section>
       
    
    <section class="cita">
        <div class="contenedor">
            <h2>
                "Eres la niña mas increible que conozco mi amor hermosa enserio te amo mamacita eres la mejor"
                -Marlon Florez
            </h2>
        </div>
   </section>


</body>
</html>
